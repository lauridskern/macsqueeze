name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-release:
    runs-on: macos-15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Swift 6.1.2
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.1.2"

      - name: Show toolchain
        run: swift --version

      - name: Resolve version
        shell: bash
        run: |
          latest_tag="$(git tag --list 'v*' --sort=-version:refname | head -n 1)"

          if [ -z "$latest_tag" ]; then
            version="0.1.0"
          else
            version="${latest_tag#v}"
            IFS='.' read -r major minor patch <<< "$version"
            major="${major:-0}"
            minor="${minor:-1}"
            patch="${patch:-0}"
            patch=$((patch + 1))
            version="${major}.${minor}.${patch}"
          fi

          echo "RELEASE_VERSION=$version" >> "$GITHUB_ENV"
          echo "RELEASE_TAG=v$version" >> "$GITHUB_ENV"

      - name: Run tests
        run: swift test

      - name: Build DMG
        run: ./scripts/create-dmg.sh "$RELEASE_VERSION"

      - name: Create git tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "$RELEASE_TAG" "$GITHUB_SHA"
          git push origin "$RELEASE_TAG"

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: MacSqueeze-${{ env.RELEASE_VERSION }}
          path: |
            dist/MacSqueeze-${{ env.RELEASE_VERSION }}.dmg
            dist/MacSqueeze-${{ env.RELEASE_VERSION }}.dmg.sha256

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_TAG }}
          target_commitish: ${{ github.sha }}
          files: |
            dist/MacSqueeze-${{ env.RELEASE_VERSION }}.dmg
            dist/MacSqueeze-${{ env.RELEASE_VERSION }}.dmg.sha256
          generate_release_notes: true
